name: GhostLy Induction & Release

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: # <--- Architect's Note: Enables the "Manual Trigger" button in GitHub

jobs:
  validate:
    name: Validation Tier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node Tier
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Enforce Type Purity
        run: npm run type-check

      - name: Enforce Code Quality
        run: npm run lint

      - name: Validate Production Synthesis
        run: npm run build

  release:
    name: Production Release
    needs: validate # <--- Never release if validation fails
    # ARCHITECTURAL GUARD: 
    # Only run on 'main' AND only when manually triggered via 'workflow_dispatch'
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vercel (Production Induction)
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

